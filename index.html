<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Sala Tavoli</title>

<style>
body { margin:0; font-family: sans-serif; background:#f5f1e6; }

.grid { display:grid; grid-template-columns: repeat(5, 1fr); gap:10px; padding:10px;}

.table-card {
  position:relative;
  background:#e8f5e9;
  border-radius:12px;
  padding:10px;
}

.busy { background:#ffebee; }

.total-time {
  position:absolute;
  top:8px;
  right:10px;
  font-size:13px;
  font-weight:900;
  color:rgba(0,0,0,0.75);
  letter-spacing:0.03em;
  background:transparent;
}

</style>
</head>

<body>

<h2 style="padding:10px;">Sala Tavoli</h2>

<div class="grid" id="grid"></div>

<script>
const TABLES_TOTAL = 20;
let tables = [];

function defaultTables(){
  return Array.from({length:TABLES_TOTAL}, (_,i)=>({
    id:i+1,
    state:"free",
    startAt:null,
    lastActionAt:null
  }));
}

function init(){
  tables = defaultTables();
  render();
}

function now(){ return Date.now(); }

function occupy(id){
  tables = tables.map(t=> t.id===id ? {...t, state:"busy", startAt:now(), lastActionAt:now()} : t);
  render();
}

function order(id){
  tables = tables.map(t=> t.id===id ? {...t, lastActionAt:now()} : t);
  render();
}

function release(id){
  tables = tables.map(t=> t.id===id ? {...t, state:"free", startAt:null, lastActionAt:null} : t);
  render();
}

function format(ms){
  if(!ms) return "--:--";
  let s = Math.floor(ms/1000);
  let m = Math.floor(s/60);
  let sec = s%60;
  return String(m).padStart(2,"0")+":"+String(sec).padStart(2,"0");
}

function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  tables.forEach(t=>{
    const card = document.createElement("div");
    card.className = "table-card "+(t.state==="busy"?"busy":"");

    const total = t.startAt ? format(now()-t.startAt) : "";

    card.innerHTML = `
      <div>${t.id}</div>
      <div>${t.state==="busy"?"Occupato":"Libero"}</div>
      ${t.state==="busy" ? `<div class="total-time">${total}</div>` : ""}
      <button onclick="occupy(${t.id})">Occupa</button>
      <button onclick="order(${t.id})">Ordina</button>
      <button onclick="release(${t.id})">Libera</button>
    `;

    grid.appendChild(card);
  });
}

setInterval(render,1000);
init();
</script>

</body>
</html>
